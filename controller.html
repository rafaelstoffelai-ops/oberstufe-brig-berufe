<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🎮 Fernsteuerung — Oberstufe Brig</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .screen.active { display: flex; }

    h1 { font-size: 26px; font-weight: 800; }
    h2 { font-size: 20px; font-weight: 700; }
    p  { color: #94a3b8; font-size: 15px; line-height: 1.5; }
    .logo { font-size: 48px; line-height: 1; }

    /* Code input */
    .code-input {
      width: 100%;
      padding: 18px 20px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 16px;
      color: #f1f5f9;
      font-size: 34px;
      font-weight: 800;
      text-align: center;
      letter-spacing: 8px;
      outline: none;
      text-transform: uppercase;
      transition: border-color 0.2s;
    }
    .code-input:focus { border-color: #2563eb; }
    .code-input::placeholder { color: #334155; letter-spacing: 4px; }

    .connect-btn {
      width: 100%;
      padding: 18px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 19px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .connect-btn:hover { background: #1d4ed8; }
    .connect-btn:active { transform: scale(0.97); }
    .connect-btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    /* Status */
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #64748b;
      display: inline-block;
      margin-right: 8px;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #22c55e; animation: pulse-dot 2s infinite; }
    .status-dot.error     { background: #ef4444; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .status-text { font-size: 14px; color: #64748b; }

    .slide-info {
      background: #1e293b;
      border-radius: 14px;
      padding: 14px 20px;
      width: 100%;
      border: 1px solid #334155;
    }
    .slide-info .section-label {
      font-size: 12px; color: #64748b;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
    }
    .slide-info .slide-title-display { font-size: 18px; font-weight: 700; }

    /* Nav buttons */
    .ctrl-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
    .ctrl-btn {
      height: 100px;
      border: none;
      border-radius: 18px;
      font-size: 28px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active { transform: scale(0.93); opacity: 0.8; }
    .ctrl-btn small { font-size: 12px; font-weight: 500; opacity: 0.8; }
    .btn-prev { background: #334155; color: #f1f5f9; }
    .btn-next { background: #2563eb; color: #fff; }
    .btn-hub {
      grid-column: 1 / -1;
      height: 62px;
      background: #1e293b;
      color: #94a3b8;
      border: 2px solid #334155;
      font-size: 18px;
    }

    /* Divider */
    .row-label {
      width: 100%;
      font-size: 11px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-align: left;
      margin-bottom: -4px;
    }

    /* Beruf buttons */
    .beruf-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    .beruf-btn {
      height: 80px;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      color: #fff;
    }
    .beruf-btn:active { transform: scale(0.93); opacity: 0.8; }
    .beruf-btn .bi { font-size: 20px; }
    .btn-auto  { background: #2563eb; }
    .btn-elek  { background: #ea580c; }
    .btn-info-app  { background: #16a34a; }
    .btn-info-plat { background: #15803d; }
    .btn-ki    { grid-column: 1 / -1; height: 62px; background: #7c3aed; font-size: 15px; flex-direction: row; gap: 8px; }

    /* Error */
    .error-msg {
      background: #450a0a;
      border: 1px solid #ef4444;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      color: #fca5a5;
      width: 100%;
      display: none;
    }
    .error-msg.show { display: block; }

    .hint { font-size: 13px; color: #475569; line-height: 1.6; }
    .disconnect-btn {
      background: none; border: none;
      color: #475569; font-size: 14px;
      cursor: pointer; padding: 8px;
      text-decoration: underline;
    }
    .disconnect-btn:hover { color: #ef4444; }
  </style>
</head>
<body>

<!-- SCREEN 1: CODE ENTRY -->
<div class="screen active" id="screen-entry">
  <div class="logo">🎮</div>
  <h1>Fernsteuerung</h1>
  <p>Code vom gelben Badge neben 🎮 in der Präsentation eingeben</p>

  <input class="code-input" id="code-input" type="text" maxlength="4"
    placeholder="····" oninput="onCodeInput(this)"
    autocomplete="off" spellcheck="false">

  <div class="error-msg" id="code-error">Code nicht gefunden — Präsentation muss geöffnet sein.</div>

  <button class="connect-btn" id="connect-btn" onclick="connect()" disabled>
    Verbinden →
  </button>

  <p class="hint">Öffne zuerst die Präsentation auf dem Laptop,<br>dann erscheint der Code neben dem 🎮 Symbol.</p>
</div>

<!-- SCREEN 2: ACTIVE CONTROL -->
<div class="screen" id="screen-control">

  <div style="width:100%;display:flex;align-items:center;justify-content:space-between;">
    <span>
      <span class="status-dot connected" id="ctrl-dot"></span>
      <span class="status-text" id="ctrl-status">Verbunden</span>
    </span>
    <span class="status-text" id="ctrl-code-display" style="color:#fbbf24;font-weight:700;font-family:monospace;"></span>
  </div>

  <div class="slide-info">
    <div class="section-label">Aktueller Slide</div>
    <div class="slide-title-display" id="ctrl-slide-title">—</div>
  </div>

  <!-- Navigation -->
  <div class="ctrl-grid">
    <button class="ctrl-btn btn-prev" ontouchstart="sendCmd('prev')" onclick="sendCmd('prev')">
      ← <small>Zurück</small>
    </button>
    <button class="ctrl-btn btn-next" ontouchstart="sendCmd('next')" onclick="sendCmd('next')">
      → <small>Weiter</small>
    </button>
    <button class="ctrl-btn btn-hub" ontouchstart="sendCmd('hub')" onclick="sendCmd('hub')">
      🏠 Hub
    </button>
  </div>

  <!-- Beruf-Auswahl -->
  <div class="row-label">Direkt zu Beruf</div>
  <div class="beruf-grid">
    <button class="beruf-btn btn-auto" ontouchstart="sendGoto('auto')" onclick="sendGoto('auto')">
      <span class="bi">🔧</span>Automatiker
    </button>
    <button class="beruf-btn btn-elek" ontouchstart="sendGoto('elek')" onclick="sendGoto('elek')">
      <span class="bi">⚡</span>Elektroniker
    </button>
    <button class="beruf-btn btn-info-app" ontouchstart="sendInfoGoto('app')" onclick="sendInfoGoto('app')">
      <span class="bi">💻</span>Info — App-Entw.
    </button>
    <button class="beruf-btn btn-info-plat" ontouchstart="sendInfoGoto('plattform')" onclick="sendInfoGoto('plattform')">
      <span class="bi">🖥️</span>Info — Plattform
    </button>
    <button class="beruf-btn btn-ki" ontouchstart="sendGoto('ki')" onclick="sendGoto('ki')">
      <span class="bi">🤖</span>KI &amp; Zukunft
    </button>
  </div>

  <button class="disconnect-btn" onclick="disconnect()">Trennen</button>
</div>

<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCcQZevTe_GufEUaGhqsOESRZXqu6YZM90",
  authDomain:        "oberstufe-brig-2026.firebaseapp.com",
  databaseURL:       "https://oberstufe-brig-2026-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "oberstufe-brig-2026",
  storageBucket:     "oberstufe-brig-2026.firebasestorage.app",
  messagingSenderId: "940814987830",
  appId:             "1:940814987830:web:da863d92c96b77c7839e97"
};

let db = null;
let sessionRef = null;
let lastCmdTs = 0;

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function initFirebase() {
  if (db) return;
  await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js');
  await loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js');
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
}

function onCodeInput(input) {
  const val = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  input.value = val;
  document.getElementById('connect-btn').disabled = val.length < 4;
  document.getElementById('code-error').classList.remove('show');
}

async function connect() {
  const code = document.getElementById('code-input').value.toUpperCase();
  if (code.length < 4) return;

  const btn = document.getElementById('connect-btn');
  btn.disabled = true;
  btn.textContent = 'Verbinde...';

  try {
    await initFirebase();
    const snap = await db.ref('sessions/' + code + '/alive').get();

    if (!snap.exists() || !snap.val()) {
      showError('Code nicht gefunden — Präsentation muss geöffnet sein.');
      btn.disabled = false;
      btn.textContent = 'Verbinden →';
      return;
    }

    sessionRef = db.ref('sessions/' + code);
    document.getElementById('ctrl-code-display').textContent = code;
    showScreen('screen-control');

    sessionRef.child('state').on('value', snap => {
      const s = snap.val();
      if (s) document.getElementById('ctrl-slide-title').textContent = s.slideTitle || s.section || '—';
    });

    sessionRef.child('alive').on('value', snap => {
      const alive = !!snap.val();
      document.getElementById('ctrl-dot').className = alive ? 'status-dot connected' : 'status-dot error';
      document.getElementById('ctrl-status').textContent = alive ? 'Verbunden' : 'Präsentation getrennt';
    });

  } catch(e) {
    showError('Verbindungsfehler. Nochmals versuchen.');
    btn.disabled = false;
    btn.textContent = 'Verbinden →';
  }
}

function sendCmd(action) {
  const now = Date.now();
  if (now - lastCmdTs < 300) return;
  lastCmdTs = now;
  if (!sessionRef) return;
  sessionRef.child('command').set({ action, ts: now });
  flash(action === 'prev' ? '.btn-prev' : action === 'next' ? '.btn-next' : '.btn-hub');
}

function sendGoto(section) {
  const now = Date.now();
  if (now - lastCmdTs < 300) return;
  lastCmdTs = now;
  if (!sessionRef) return;
  sessionRef.child('command').set({ action: 'goto', section, ts: now });
  flash('.btn-' + section);
}

function sendInfoGoto(spec) {
  const now = Date.now();
  if (now - lastCmdTs < 300) return;
  lastCmdTs = now;
  if (!sessionRef) return;
  sessionRef.child('command').set({ action: 'goto', section: 'info', spec, ts: now });
  flash(spec === 'app' ? '.btn-info-app' : '.btn-info-plat');
}

function flash(selector) {
  const el = document.querySelector(selector);
  if (!el) return;
  el.style.opacity = '0.5';
  setTimeout(() => { el.style.opacity = ''; }, 200);
}

function showError(msg) {
  const el = document.getElementById('code-error');
  el.textContent = msg;
  el.classList.add('show');
}

function disconnect() {
  if (sessionRef) { sessionRef.off(); sessionRef = null; }
  document.getElementById('code-input').value = '';
  document.getElementById('connect-btn').disabled = true;
  document.getElementById('connect-btn').textContent = 'Verbinden →';
  document.getElementById('code-error').classList.remove('show');
  showScreen('screen-entry');
  setTimeout(() => document.getElementById('code-input').focus(), 100);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

setTimeout(() => document.getElementById('code-input').focus(), 100);
</script>

</body>
</html>
